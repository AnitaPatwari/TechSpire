<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us - TechSpire Cloud Academy</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
    background: transparent;
    position: absolute;
    width: 100%;
    color: white;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: #00c6ff;
}

.nav-links a {
    margin: 0 15px;
    text-decoration: none;
    color: white;
    font-weight: 500;
}

.demo-btn {
    border: 1px solid orange;
    padding: 8px 18px;
    border-radius: 25px;
    color: orange;
}

/* HERO SECTION */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
    background: linear-gradient(to right, #0b3c6f, #0a6ed1);
    color: white;
}

.hero-text {
    max-width: 600px;
}

.hero-text h1 {
    font-size: 60px;
    margin-bottom: 20px;
}

.hero-text p {
    font-size: 20px;
    line-height: 1.6;
}

.quote {
    margin-top: 20px;
    font-style: italic;
    opacity: 0.8;
}

/* IMAGE */
.hero img {
    width: 500px;
    max-width: 100%;
}

/* RESPONSIVE */
@media(max-width: 768px) {
    .hero {
        flex-direction: column;
        text-align: center;
        padding: 40px;
    }

    .hero img {
        margin-top: 30px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">TechSpire</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About Us</a>
        <a href="#">Courses</a>
        <a href="#">Contact</a>
    </div>

    <div class="demo-btn">Free Demo</div>
</div>

<!-- HERO / ABOUT SECTION -->
<section class="hero">

    <div class="hero-text">
        <h1>About Us</h1>

        <p>
        We strive to provide IT professionals with real-world cloud expertise 
        to succeed in today’s competitive market.
        </p>

        <p class="quote">
        "Learn who we are, what we do & how we do it!"
        </p>
    </div>

    <!-- Replace with your image -->
    <img src="https://cdn-icons-png.flaticon.com/512/4149/4149675.png" alt="Cloud Learning">

</section>

</body>
</html>
